<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מרכז מחשבונים פיננסיים | השקעות שעושות שכל</title>
    <link rel="stylesheet" href="style.css?v=12.0">
    <style>
        .calc-wrapper { max-width: 950px; margin: 40px auto; padding: 0 24px; }
        .calc-card { background-color: var(--bg-white); border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(17,30,45,0.08); overflow: hidden; }
        
        .calc-tabs { display: flex; background-color: var(--primary-color); border-bottom: 2px solid var(--accent-color); }
        .tab-btn { flex: 1; padding: 18px; background: none; border: none; color: #94a3b8; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: var(--font-stack); text-align: center; }
        .tab-btn:hover { color: var(--accent-color); background-color: rgba(255,255,255,0.03); }
        .tab-btn.active { color: var(--primary-color); background-color: var(--accent-color); }

        .calc-body { padding: 40px; display: none; }
        .calc-body.active { display: block; }
        
        .input-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-bottom: 24px; }
        @media (max-width: 768px) { .input-grid { grid-template-columns: 1fr; gap: 16px; } }
        
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 14.5px; font-weight: 700; color: var(--text-main); margin-bottom: 8px; }
        .input-wrapper input, .input-wrapper select { width: 100%; padding: 12px 14px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 15px; font-family: var(--font-stack); background-color: var(--bg-light); color: var(--primary-color); }
        .input-wrapper input:focus, .input-wrapper select:focus { outline: none; border-color: var(--accent-color); background-color: var(--bg-white); box-shadow: 0 0 0 3px rgba(212,175,55,0.15); }

        .advanced-toggle { background-color: #f1f5f9; padding: 12px 16px; border-radius: 6px; font-weight: 700; color: var(--primary-color); cursor: pointer; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border-color); transition: all 0.2s; }
        .advanced-toggle:hover { background-color: #e2e8f0; }
        .advanced-content { display: none; padding: 24px; border: 1px solid var(--border-color); border-radius: 6px; margin-bottom: 24px; background-color: #fbfbfb; }

        .btn-calc { width: 100%; background-color: var(--primary-color); color: var(--accent-color); border: 1px solid var(--accent-color); padding: 16px; font-size: 17px; font-weight: 800; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .btn-calc:hover { background-color: var(--accent-color); color: var(--primary-color); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(212,175,55,0.2); }

        .results-box { margin-top: 32px; padding: 28px; background-color: var(--bg-light); border-radius: 8px; border-right: 4px solid var(--accent-color); display: none; }
        .results-box h3 { margin: 0 0 20px 0; font-size: 19px; font-weight: 800; color: var(--primary-color); }
        .result-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color); font-size: 15.5px; }
        .result-row:last-of-type { border-bottom: none; font-size: 22px; font-weight: 800; padding-top: 14px; margin-top: 8px; }
        .warning { color: var(--accent-error); font-weight: 700; }
        .success { color: var(--accent-success); font-weight: 700; }
        .benefit { color: #3b82f6; font-weight: 700; }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <a href="index.html" class="logo-wrapper">
                <img src="logo.jpg" alt="השקעות שעושות שכל" class="site-logo">
                <span class="logo-text">השקעות שעושות שכל</span>
            </a>
            <a href="index.html" style="color: var(--bg-light); text-decoration: none; font-weight: 600; font-size: 15px;">← חזרה לדף הבית</a>
        </div>
    </header>

    <div class="calc-wrapper">
        <div class="calc-card">
            <div class="calc-tabs">
                <button class="tab-btn active" onclick="switchTab('tax-calc', this)">⚖️ מחשבון מס הכנסה ונטו</button>
                <button class="tab-btn" onclick="switchTab('interest-calc', this)">📈 סימולטור ריבית דריבית</button>
            </div>

            <div id="tax-calc" class="calc-body active">
                <div class="input-grid">
                    <div class="input-group">
                        <label for="annualGross">שכר ברוטו שנתי חזוי (₪)</label>
                        <div class="input-wrapper"><input type="number" id="annualGross" value="240000"></div>
                    </div>
                    <div class="input-group">
                        <label for="gender">מגדר (קובע תעריף נקו"ז בסיס)</label>
                        <div class="input-wrapper">
                            <select id="gender">
                                <option value="male">גבר (2.25 נקו"ז בסיס)</option>
                                <option value="female">אישה (2.75 נקו"ז בסיס)</option>
                            </select>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="kids0">תינוקות בשנת הלידה (גיל 0)</label>
                        <div class="input-wrapper"><input type="number" id="kids0" value="0" min="0"></div>
                    </div>
                    <div class="input-group">
                        <label for="kids1to2">פעוטות בגילאי 1 עד 2</label>
                        <div class="input-wrapper"><input type="number" id="kids1to2" value="0" min="0"></div>
                    </div>
                    <div class="input-group">
                        <label for="kids3">ילדים בני 3</label>
