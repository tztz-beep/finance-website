name: Update Market Data Metrics

on:
  schedule:
    - cron: '*/30 * * * *' # המערכת תתעורר אוטומטית ותעדכן את הנתונים כל 30 דקות
  workflow_dispatch: # מאפשר לך להפעיל את העדכון ידנית בלחיצת כפתור בכל רגע

jobs:
  update-ticker-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Fetch and Build Live Market JSON
        run: node update-ticker.js

      - name: Commit and Push Verified Metrics
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add market_data.json
          git commit -m "Automated Market Data Sync [skip ci]" || exit 0
          git push
