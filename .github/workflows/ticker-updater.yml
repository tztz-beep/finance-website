name: Update Market Data Metrics

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

# שורת המחץ: הענקת הרשאה מפורשת לשרת לכתוב ולשמור את קובץ הנתונים
permissions:
  contents: write

jobs:
  update-ticker-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # שודרג ל-v4 למניעת אזהרות

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4 # שודרג ל-v4
        with:
          node-version: '20' # מעבר לגרסת מנוע יציבה ועדכנית

      - name: Fetch and Build Live Market JSON
        run: node update-ticker.js

      - name: Commit and Push Verified Metrics
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add market_data.json
          git commit -m "Automated Market Data Sync [skip ci]" || exit 0
          git push
