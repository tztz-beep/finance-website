<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פאנל ניהול | השקעות שעושות שכל</title>
    <style>
        html, body, #sanity-app {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f4f6f8;
            font-family: system-ui, -apple-system, sans-serif;
        }
        /* חיווי טעינה לפני שהמערכת עולה */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #1e293b;
            font-weight: 600;
            font-size: 18px;
        }
    </style>
</head>
<body>
    
    <div id="loading">טוען את סביבת העבודה המאובטחת...</div>
    <div id="sanity-app"></div>

    <script type="module">
        // ייבוא ישיר מהשרתים המקומפלים של esm.sh שמונעים שגיאות React
        import { defineConfig, renderStudio } from 'https://esm.sh/@sanity/studio@3';

        // העלמת טקסט הטעינה כשהמערכת מתחילה לעלות
        document.getElementById('loading').style.display = 'none';

        const postSchema = {
            name: 'post',
            title: 'סקירות ומאמרים',
            type: 'document',
            fields: [
                {
                    name: 'title',
                    title: 'כותרת הסקירה',
                    type: 'string',
                    validation: (Rule) => Rule.required()
                },
                {
                    name: 'slug',
                    title: 'מזהה קישור (Slug)',
                    type: 'slug',
                    options: {
                        source: 'title',
                        maxLength: 96,
                    },
                    validation: (Rule) => Rule.required()
                },
                {
                    name: 'category',
                    title: 'ניתוב ללשונית באתר',
                    type: 'string',
                    options: {
                        list: [
                            { title: '📊 ייעוץ וניהול השקעות', value: 'investments' },
                            { title: '⚖️ תכנון מס ופרישה', value: 'tax' },
                            { title: '🛡️ ייעוץ וליווי פנסיוני', value: 'pension' },
                            { title: '💼 קופות גמל והשתלמות', value: 'funds' }
                        ],
                    },
                    validation: (Rule) => Rule.required()
                },
                {
                    name: 'excerpt',
                    title: 'תקציר לכרטיסייה (יופיע בדף הבית)',
                    type: 'text',
                    rows: 3,
                    validation: (Rule) => Rule.max(200)
                },
                {
                    name: 'body',
                    title: 'גוף הכתבה המלא',
                    type: 'array',
                    of: [{ type: 'block' }]
                }
            ]
        };

        const config = defineConfig({
            projectId: 'nk1s624p', 
            dataset: 'production',
            title: 'השקעות שעושות שכל - מערכת ניהול',
            // הנתיב המדויק שבו הסטודיו רץ ב-GitHub Pages
            basePath: '/finance-website/studio.html', 
            schema: {
                types: [postSchema]
            }
        });

        // רינדור הסטודיו לתוך האלמנט במסך
        renderStudio(document.getElementById('sanity-app'), config);
    </script>
</body>
</html>
