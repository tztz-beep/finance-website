<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת ניהול תוכן | השקעות שעושות שכל</title>
    <style>
        html, body, #sanity {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div id="sanity"></div>

    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@sanity/studio@3/dist/index.umd.js"></script>

    <script>
        // חילוץ פונקציות המבנה של המערכת
        const { defineConfig, renderStudio, createSchema } = window.SanityStudio;

        // הגדרת הארכיטקטורה והשדות של המאמרים שלך (The Schema)
        const postSchema = {
            name: 'post',
            title: 'סקירות ומאמרים',
            type: 'document',
            fields: [
                {
                    name: 'title',
                    title: 'כותרת הסקירה',
                    type: 'string',
                    validation: Rule => Rule.required()
                },
                {
                    name: 'slug',
                    title: 'מזהה קישור (Slug)',
                    type: 'slug',
                    options: {
                        source: 'title',
                        maxLength: 96,
                    },
                    validation: Rule => Rule.required()
                },
                {
                    name: 'category',
                    title: 'ניתוב ללשונית באתר',
                    type: 'string',
                    options: {
                        list: [
                            { title: '📊 ייעוץ וניהול השקעות', value: 'investments' },
                            { title: '⚖️ תכנון מס ופרישה', value: 'tax' },
                            { title: '🛡️ ייעוץ וליווי פנסיוני', value: 'pension' },
                            { title: '💼 קופות גמל והשתלמות', value: 'funds' }
                        ],
                    },
                    validation: Rule => Rule.required()
                },
                {
                    name: 'excerpt',
                    title: 'תקציר לכרטיסייה (יופיע בדף הבית)',
                    type: 'text',
                    rows: 3,
                    validation: Rule => Rule.max(200)
                },
                {
                    name: 'body',
                    title: 'גוף הכתבה המלא',
                    type: 'array',
                    of: [{ type: 'block' }] // הגדרת עורך טקסט עשיר (Rich Text)
                }
            ]
        };

        // הפעלת קונפיגורציית הסטודיו המותאמת אישית לפרויקט שלך
        const config = defineConfig({
            projectId: 'nk1s624p', // חיבור למזהה הייחודי שלך
            dataset: 'production',
            title: 'השקעות שעושות שכל - פאנל ניהול',
            basePath: '/finance-website/studio.html', // נתיב הרצה תואם ל-GitHub Pages
            schema: {
                types: [postSchema]
            }
        });

        // רינדור והזרקה של ממשק המשתמש למסך
        renderStudio(document.getElementById('sanity'), config);
    </script>
</body>
</html>
