<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ייעוץ וליווי פנסיוני | השקעות שעושות שכל</title>
    <link rel="stylesheet" href="style.css?v=16.0">
    <style>
        body { background-color: #f8f9fa; }
        .page-header { background: var(--primary-color); color: white; padding: 50px 0; text-align: center; margin-bottom: 40px; }
        .page-header h1 { margin: 0 0 10px 0; font-size: 34px; font-weight: 800; }
        .page-header p { margin: 0; font-size: 18px; opacity: 0.9; max-width: 600px; margin: 0 auto; }
        
        .content-container { max-width: 900px; margin: 0 auto 60px auto; background: var(--bg-white, #ffffff); padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(17,30,45,0.05); border: 1px solid var(--border-color); }
        .section-title { color: var(--primary-color); font-size: 24px; font-weight: 800; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; margin-bottom: 24px; }
        
        .dynamic-content-area { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .injected-article { background: #fdfdfd; padding: 24px; border-radius: 8px; border: 1px solid var(--border-color); transition: box-shadow 0.2s; }
        .injected-article:hover { box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .injected-article h5 { color: var(--primary-color); font-size: 18px; font-weight: 800; margin: 0 0 8px 0; }
        .injected-article p { color: var(--text-main); font-size: 15px; margin: 0 0 16px 0; line-height: 1.6; }
        .injected-article a { display: inline-block; background: var(--primary-color); color: white; padding: 8px 16px; border-radius: 4px; font-weight: 600; font-size: 14px; text-decoration: none; transition: background 0.2s; }
        .injected-article a:hover { background: var(--accent-color); }
    </style>
</head>
<body>

    <header class="main-header" style="background: white; border-bottom: 1px solid var(--border-color);">
        <div class="header-container">
            <a href="index.html" class="logo-wrapper">
                <img src="logo.jpg" alt="השקעות שעושות שכל" class="site-logo">
                <span class="logo-text">השקעות שעושות שכל</span>
            </a>
            <a href="index.html" style="font-weight: 600; text-decoration: none; color: var(--text-muted);">← חזרה לעמוד הבית</a>
        </div>
    </header>

    <div class="page-header">
        <div class="container">
            <h1>ייעוץ וליווי פנסיוני</h1>
            <p>ניתוח מעמיק של מבנה החיסכון ארוך הטווח, אופטימיזציית דמי ניהול והתאמת מסלולים מניבים.</p>
        </div>
    </div>

    <div class="content-container">
        <h2 class="section-title">מאמרים וסקירות פנסיוניות</h2>
        <div id="pension-content-area" class="dynamic-content-area">
            <p style="color: var(--text-muted); text-align: center; padding: 20px;">הסקירות נמצאות בשלבי כתיבה ויעודכנו בקרוב.</p>
        </div>
    </div>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 השקעות שעושות שכל. כל הזכויות שמורות לפיתוח עצמאי מוגן.</p>
        </div>
    </footer>

    <script src="script.js?v=16.0"></script>
</body>
</html>
